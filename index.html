<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ - Balneabilidade - Qualidade das Praias</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon-16x16.png">
    <link rel="shortcut icon" href="./img/favicon.ico">
    
    <!-- Meta Tags for Social Sharing -->
    <meta name="description" content="Condições das praias do Rio de Janeiro em tempo real. Dados semanais do INEA sobre qualidade da água para banho.">
    <meta name="author" content="Rio de Janeiro - Balneabilidade ">
    
    <!-- Open Graph / Facebook / WhatsApp / Telegram -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Rio de Janeiro - Balneabilidade ">
    <meta property="og:title" content="Rio de Janeiro - Balneabilidade  - Qualidade das Praias">
    <meta property="og:description" content="Condições das praias do Rio de Janeiro em tempo real. Dados semanais do INEA sobre qualidade da água para banho.">
    <meta property="og:image" content="./img/og-image.png">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Rio de Janeiro - Balneabilidade ">
    <link rel="manifest" href="./data/manifest.json">
    <link rel="apple-touch-icon" href="./img/apple-touch-icon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <div id="app">
        <button class="toggle-sidebar" onclick="toggleSidebar()">☰ Praias</button>
        
        <div id="sidebar">
            <div class="header">
                <h1>Rio de Janeiro - Balneabilidade </h1>
                <p>Qualidade das praias</p>
            </div>

            <div class="alert" id="weatherAlert">
                Chuvas recentes podem afetar a qualidade da água.
            </div>

            <div class="controls">
                <div class="sort-buttons">
                    <button class="sort-btn active" data-sort="favorites">Favoritas</button>
                    <button class="sort-btn" data-sort="name">Nome</button>
                    <button class="sort-btn" data-sort="status">Status</button>
                </div>
            </div>

            <div class="beach-list" id="beachList"></div>

            <div class="legend">
                <div class="legend-item" data-status="proper">
                    <div class="status-indicator status-proper"></div>
                    <span>Própria</span>
                </div>
                <div class="legend-item" data-status="warning">
                    <div class="status-indicator status-warning"></div>
                    <span>Atenção</span>
                </div>
                <div class="legend-item" data-status="improper">
                    <div class="status-indicator status-improper"></div>
                    <span>Imprópria</span>
                </div>
                <div class="legend-item hidden" data-status="unknown">
                    <div class="status-indicator status-unknown"></div>
                    <span>Desconhecido</span>
                </div>
            </div>
        </div>

        <div id="map">
            <div class="loading" id="loading">Carregando dados...</div>
            <button class="locate-btn" id="locateBtn" onclick="getUserLocation()" title="Mostrar minha localização">📍</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/app.js"></script>
    
    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./js/sw.js')
                    .then((registration) => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
