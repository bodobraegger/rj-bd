name: Update Beach Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Run every Wednesday at 22:00 UTC (19:00 Rio time / 7 PM)
    - cron: '0 22 * * 3'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      
      - name: Download latest INEA bulletins
        run: |
          # Try to find bulletin from the last 14 days
          SUCCESS=0
          for days_ago in {0..14}; do
            # Calculate date
            if [[ "$OSTYPE" == "darwin"* ]]; then
              # macOS
              DATE_DASH=$(date -v-${days_ago}d +%d-%m-%y)
              DATE_DOT=$(date -v-${days_ago}d +%d.%m.%y)
              DATE_COMPACT=$(date -v-${days_ago}d +%Y%m%d)
              YEAR=$(date -v-${days_ago}d +%Y)
              MONTH=$(date -v-${days_ago}d +%m)
              DAY=$(date -v-${days_ago}d +%d)
            else
              # Linux
              DATE_DASH=$(date -d "$days_ago days ago" +%d-%m-%y)
              DATE_DOT=$(date -d "$days_ago days ago" +%d.%m.%y)
              DATE_COMPACT=$(date -d "$days_ago days ago" +%Y%m%d)
              YEAR=$(date -d "$days_ago days ago" +%Y)
              MONTH=$(date -d "$days_ago days ago" +%m)
              DAY=$(date -d "$days_ago days ago" +%d)
            fi
            
            # Try new format first (2026 format)
            FILENAME_NEW="Site-Boletim-de-Balneabilidade-do-Estado-do-RJ-_${DATE_COMPACT}_155642_0000.pdf_${DATE_DOT}.pdf"
            URL_NEW="https://www.inea.rj.gov.br/wp-content/uploads/${YEAR}/${MONTH}/${FILENAME_NEW}"
            
            if curl -f -s -I "$URL_NEW" > /dev/null 2>&1; then
              echo "✓ Found bulletin (new format) at $URL_NEW"
              curl -f -L "$URL_NEW" -o "${FILENAME_NEW}"
              ln -sf "${FILENAME_NEW}" latest-bulletin.pdf
              SUCCESS=1
              break
            fi
            
            # Try old format (pre-2026 format)
            FILENAME_OLD="Zona-oeste-e-Zona-sul-${DATE_DASH}.pdf"
            URL_OLD="https://www.inea.rj.gov.br/wp-content/uploads/${YEAR}/${MONTH}/${FILENAME_OLD}"
            
            if curl -f -s -I "$URL_OLD" > /dev/null 2>&1; then
              echo "✓ Found bulletin (old format) at $URL_OLD"
              curl -f -L "$URL_OLD" -o "${FILENAME_OLD}"
              ln -sf "${FILENAME_OLD}" latest-bulletin.pdf
              SUCCESS=1
              break
            fi
            
            echo "  Bulletin not found for ${DATE_DASH}"
          done
          
          if [ $SUCCESS -eq 0 ]; then
            echo "✗ Could not find bulletin in the last 14 days"
            exit 1
          fi
          
          # Verify PDF was downloaded
          if [ -s latest-bulletin.pdf ]; then
            echo "✓ PDF file size: $(stat -c%s latest-bulletin.pdf 2>/dev/null || stat -f%z latest-bulletin.pdf) bytes"
          else
            echo "✗ PDF download failed or file is empty"
            exit 1
          fi
      
      - name: Parse bulletin and generate JSON
        run: |
          python3 scripts/parse_inea_bulletin.py
          echo "Generated data/beachData.json at $(date)"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
