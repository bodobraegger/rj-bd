name: Update Beach Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Run every Wednesday at 22:00 UTC (19:00 Rio time / 7 PM)
    - cron: '0 22 * * 3'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      
      - name: Download latest INEA bulletins
        run: |
          # Try to find bulletin from the last 14 days
          SUCCESS=0
          for days_ago in {0..14}; do
            if [[ "$OSTYPE" == "darwin"* ]]; then
              # macOS
              DATE=$(date -v-${days_ago}d +%d.%m.%y)
              DATE_NEXT=$(date -v-$((days_ago-1))d +%Y%m%d)
              YEAR=$(date -v-${days_ago}d +%Y)
              MONTH=$(date -v-${days_ago}d +%m)
              DATE_OLD=$(date -v-${days_ago}d +%d-%m-%y)
            else
              # Linux
              DATE=$(date -d "$days_ago days ago" +%d.%m.%y)
              DATE_NEXT=$(date -d "$((days_ago-1)) days ago" +%Y%m%d)
              YEAR=$(date -d "$days_ago days ago" +%Y)
              MONTH=$(date -d "$days_ago days ago" +%m)
              DATE_OLD=$(date -d "$days_ago days ago" +%d-%m-%y)
            fi
            
            FILENAME="Site-Boletim-de-Balneabilidade-do-Estado-do-RJ-_${DATE_NEXT}_155642_0000.pdf_${DATE}.pdf"
            
            # Try new format in current month folder
            URL="https://www.inea.rj.gov.br/wp-content/uploads/${YEAR}/${MONTH}/${FILENAME}"
            if curl -f -s -I "$URL" > /dev/null 2>&1; then
              echo "✓ Found bulletin at $URL"
              curl -f -L "$URL" -o "${FILENAME}"
              ln -sf "${FILENAME}" latest-bulletin.pdf
              SUCCESS=1
              break
            fi
            
            # Calculate next month for cross-month cases
            if [[ "$OSTYPE" == "darwin"* ]]; then
              MONTH_NEXT=$(date -v-${days_ago}d -v+1m +%m)
              YEAR_NEXT=$(date -v-${days_ago}d -v+1m +%Y)
            else
              MONTH_NEXT=$(date -d "$days_ago days ago + 1 month" +%m)
              YEAR_NEXT=$(date -d "$days_ago days ago + 1 month" +%Y)
            fi
            
            # Try new format in next month folder
            URL="https://www.inea.rj.gov.br/wp-content/uploads/${YEAR_NEXT}/${MONTH_NEXT}/${FILENAME}"
            if curl -f -s -I "$URL" > /dev/null 2>&1; then
              echo "✓ Found bulletin at $URL"
              curl -f -L "$URL" -o "${FILENAME}"
              ln -sf "${FILENAME}" latest-bulletin.pdf
              SUCCESS=1
              break
            fi
            
            # Try old format
            FILENAME_OLD="Zona-oeste-e-Zona-sul-${DATE_OLD}.pdf"
            URL_OLD="https://www.inea.rj.gov.br/wp-content/uploads/${YEAR}/${MONTH}/${FILENAME_OLD}"
            
            if curl -f -s -I "$URL_OLD" > /dev/null 2>&1; then
              echo "✓ Found bulletin at $URL_OLD"
              curl -f -L "$URL_OLD" -o "${FILENAME_OLD}"
              ln -sf "${FILENAME_OLD}" latest-bulletin.pdf
              SUCCESS=1
              break
            fi
          done
          
          if [ $SUCCESS -eq 0 ]; then
            echo "✗ Could not find bulletin in the last 14 days"
            exit 1
          fi
          
          # Verify PDF was downloaded
          if [ -s latest-bulletin.pdf ]; then
            echo "✓ PDF file size: $(stat -c%s latest-bulletin.pdf 2>/dev/null || stat -f%z latest-bulletin.pdf) bytes"
          else
            echo "✗ PDF download failed or file is empty"
            exit 1
          fi
      
      - name: Parse bulletin and generate JSON
        run: |
          python3 scripts/parse_inea_bulletin.py
          echo "Generated data/beachData.json at $(date)"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
