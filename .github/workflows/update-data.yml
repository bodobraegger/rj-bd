name: Update Beach Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Run every Monday at 6 AM UTC (3 AM Rio time)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      
      - name: Download latest INEA bulletins
        run: |
          # Try to download bulletin from the last 7 days
          SUCCESS=0
          for days_ago in {0..7}; do
            # Calculate date
            if [[ "$OSTYPE" == "darwin"* ]]; then
              # macOS
              DATE=$(date -v-${days_ago}d +%d-%m-%y)
              YEAR=$(date -v-${days_ago}d +%Y)
              MONTH=$(date -v-${days_ago}d +%m)
            else
              # Linux
              DATE=$(date -d "$days_ago days ago" +%d-%m-%y)
              YEAR=$(date -d "$days_ago days ago" +%Y)
              MONTH=$(date -d "$days_ago days ago" +%m)
            fi
            
            FILENAME="Zona-oeste-e-Zona-sul-${DATE}.pdf"
            URL="https://www.inea.rj.gov.br/wp-content/uploads/${YEAR}/${MONTH}/${FILENAME}"
            echo "Trying: $URL"
            
            if curl -f -L "$URL" -o "${FILENAME}" 2>/dev/null; then
              echo "✓ Downloaded bulletin from $DATE as ${FILENAME}"
              # Create symlink for script compatibility
              ln -sf "${FILENAME}" latest-bulletin.pdf
              SUCCESS=1
              break
            fi
          done
          
          if [ $SUCCESS -eq 0 ]; then
            echo "✗ Could not find bulletin in the last 7 days"
            exit 1
          fi
          
          # Verify PDF was downloaded
          if [ -s latest-bulletin.pdf ]; then
            echo "✓ PDF file size: $(stat -c%s latest-bulletin.pdf 2>/dev/null || stat -f%z latest-bulletin.pdf) bytes"
          else
            echo "✗ PDF download failed or file is empty"
            exit 1
          fi
          fi
          
          # Verify PDF was downloaded
          if [ -s latest-bulletin.pdf ]; then
            echo "✓ PDF file size: $(stat -c%s latest-bulletin.pdf 2>/dev/null || stat -f%z latest-bulletin.pdf) bytes"
          else
            echo "✗ PDF download failed or file is empty"
            exit 1
          fi
      
      - name: Parse bulletin and generate JSON
        run: |
          python3 scripts/parse_inea_bulletin.py
          echo "Generated data/beachData.json at $(date)"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
